name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init -v

      - name: Build usque.aar
        run: |
          cd android
          make android
          mkdir -p usque-vpn/app/libs
          cp usque.aar usque-vpn/app/libs/

      - name: Generate release keystore (first run only)
        id: keystore
        run: |
          KEYSTORE="android/usque-vpn/app/keystore/usque-release.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            echo "Generating release keystore..."
            mkdir -p "$(dirname "$KEYSTORE")"
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -storepass usque2024 \
              -alias usque \
              -keypass usque2024 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -dname "CN=Usque VPN, OU=Dev, O=GarthNet, L=Unknown, ST=Unknown, C=US"
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "Keystore already exists, using it."
            echo "generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit keystore (first run only)
        if: steps.keystore.outputs.generated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/usque-vpn/app/keystore/usque-release.keystore
          git commit -m "chore: add release keystore"
          git push

      - name: Calculate version
        id: version
        run: |
          # Auto-increment from latest release tag
          LATEST_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "" ]; then
            NEW_VERSION="1.0.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          
          # Convert version to versionCode (major*10000 + minor*100 + patch)
          MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          PATCH=$(echo "$NEW_VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION (code: $VERSION_CODE)"

      - name: Update version in build.gradle.kts
        run: |
          cd android/usque-vpn/app
          sed -i "s/versionCode = .*/versionCode = ${{ steps.version.outputs.version_code }}/" build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"${{ steps.version.outputs.version }}\"/" build.gradle.kts
          echo "Updated build.gradle.kts:"
          grep -E "versionCode|versionName" build.gradle.kts

      - name: Generate Gradle Wrapper
        run: |
          cd android/usque-vpn
          gradle wrapper

      - name: Build Release APK
        run: |
          cd android/usque-vpn
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK_SRC="android/usque-vpn/app/build/outputs/apk/release/app-release.apk"
          APK_DST="android/usque-vpn/app/build/outputs/apk/release/Usque-v${{ steps.version.outputs.version }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK: $APK_DST"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Usque VPN v${{ steps.version.outputs.version }}"
          files: android/usque-vpn/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
