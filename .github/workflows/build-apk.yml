name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init -v

      - name: Build usque.aar
        run: |
          cd android
          make android
          mkdir -p usque-vpn/app/libs
          cp usque.aar usque-vpn/app/libs/

      - name: Generate Gradle Wrapper
        run: |
          cd android/usque-vpn
          gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: |
          cd android/usque-vpn
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Get version
        id: version
        run: echo "tag=v$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Usque VPN Debug ${{ steps.version.outputs.tag }}"
          files: android/usque-vpn/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
