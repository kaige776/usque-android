name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init -v

      - name: Build usque.aar
        run: |
          cd android
          make android
          mkdir -p usque-vpn/app/libs
          cp usque.aar usque-vpn/app/libs/

      - name: Generate debug keystore
        run: |
          cd android/usque-vpn/app
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Usque Debug, OU=Dev, O=Usque, L=Unknown, ST=Unknown, C=US"

      - name: Generate Gradle Wrapper
        run: |
          cd android/usque-vpn
          gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: |
          cd android/usque-vpn
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Get version and rename APK
        id: version
        run: |
          TAG="v$(date +%Y%m%d-%H%M)"
          VERSION=$(grep 'versionName' android/usque-vpn/app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          APK_SRC="android/usque-vpn/app/build/outputs/apk/debug/app-debug.apk"
          APK_DST="android/usque-vpn/app/build/outputs/apk/debug/Usque-${VERSION}-${TAG}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk_name=Usque-${VERSION}-${TAG}.apk" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Usque VPN ${{ steps.version.outputs.tag }}"
          files: android/usque-vpn/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
